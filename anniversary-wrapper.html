<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opening Website</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff7fb;
        --card: rgba(255, 255, 255, 0.88);
        --border: rgba(40, 32, 42, 0.1);
        --text: #28202a;
        --muted: rgba(40, 32, 42, 0.68);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: var(--text);
        background:
          radial-gradient(900px 460px at 18% 12%, #ffe6f2 0%, transparent 60%),
          radial-gradient(780px 420px at 82% 5%, #e8f3ff 0%, transparent 58%),
          var(--bg);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 420px);
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        box-shadow: 0 18px 44px rgba(40, 32, 42, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.1rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      button {
        margin-top: 16px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening website</h1>
      <p id="status">Preparing the anniversary page...</p>
      <button id="retryBtn" type="button" hidden>Try again</button>
    </main>

    <script>
      const params = new URLSearchParams(location.search);
      const statusEl = document.getElementById("status");
      const retryBtn = document.getElementById("retryBtn");
      const wrapperUrl = location.href.split("#")[0].split("?")[0];

      const defaultConfig = {
        supabaseUrl: "https://ytrbsxknhlsfqkqphlms.supabase.co",
        bucket: "anniversary",
        path: "index.html"
      };

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function encodePath(path) {
        return String(path)
          .split("/")
          .filter(Boolean)
          .map((segment) => encodeURIComponent(segment))
          .join("/");
      }

      function buildPublicUrl(config) {
        const base = String(config.supabaseUrl || "").replace(/\/+$/, "");
        if (!base || !config.bucket || !config.path) return "";
        return `${base}/storage/v1/object/public/${encodeURIComponent(config.bucket)}/${encodePath(config.path)}`;
      }

      function getConfig() {
        return {
          supabaseUrl: params.get("supabaseUrl") || defaultConfig.supabaseUrl,
          bucket: params.get("bucket") || defaultConfig.bucket,
          path: params.get("path") || defaultConfig.path,
          url: params.get("url") || ""
        };
      }

      function resolveUrl(config) {
        if (config.url && /^https?:\/\//i.test(config.url)) return config.url;
        return buildPublicUrl(config);
      }

      function getAssetBaseUrl(url) {
        return url.slice(0, url.lastIndexOf("/") + 1);
      }

      function addBaseHref(html, url) {
        const baseTag = `<base href="${getAssetBaseUrl(url)}">`;
        if (/<head[\s>]/i.test(html)) {
          return html.replace(/<head([^>]*)>/i, `<head$1>${baseTag}`);
        }
        return `${baseTag}${html}`;
      }

      function escapeInlineScript(script) {
        return script.replace(/<\/script/gi, "<\\/script");
      }

      function patchNavigationScript(script) {
        return script.replaceAll(
          "window.location.assign(getStoryPath())",
          "window.__openWrappedPage(getStoryPath())"
        );
      }

      function patchInlineNavigation(html) {
        return html
          .replaceAll("window.location.href = 'index.html';", "window.__openWrappedPage('index.html');")
          .replaceAll('window.location.href = "index.html";', 'window.__openWrappedPage("index.html");');
      }

      function injectNavigationBridge(html, sourceUrl) {
        const bridgeCode = `
          window.__openWrappedPage = function (path) {
            const nextUrl = new URL(path, ${JSON.stringify(getAssetBaseUrl(sourceUrl))}).href;
            const launcherUrl = new URL(${JSON.stringify(wrapperUrl)});
            launcherUrl.searchParams.set("url", nextUrl);
            window.location.assign(launcherUrl.href);
          };
        `;
        const closingScriptTag = "<" + "/script>";
        const bridgeTag = `<script>${escapeInlineScript(bridgeCode)}${closingScriptTag}`;

        if (/<head[\s>]/i.test(html)) {
          return html.replace(/<head([^>]*)>/i, `<head$1>${bridgeTag}`);
        }

        return `${bridgeTag}${html}`;
      }

      async function inlinePatchedScripts(html, pageUrl) {
        const pageOrigin = new URL(pageUrl).origin;
        const scriptTagPattern = /<script\b([^>]*)\bsrc=["']([^"']+\.js[^"']*)["']([^>]*)>\s*<\/script>/gi;
        const replacements = [];

        for (const match of html.matchAll(scriptTagPattern)) {
          const sourceUrl = new URL(match[2], pageUrl);
          if (sourceUrl.origin !== pageOrigin) continue;

          const response = await fetch(sourceUrl.href, { cache: "no-store" });
          if (!response.ok) continue;

          const attrs = `${match[1]}${match[3]}`.replace(/\s+(async|defer)\b/gi, "");
          const patchedScript = patchNavigationScript(await response.text());
          const closingScriptTag = "<" + "/script>";

          replacements.push({
            from: match[0],
            to: `<script${attrs}>${escapeInlineScript(patchedScript)}${closingScriptTag}`
          });
        }

        return replacements.reduce(
          (updatedHtml, replacement) => updatedHtml.replace(replacement.from, replacement.to),
          html
        );
      }

      async function prepareHtml(html, url) {
        let preparedHtml = html.replace(/^\uFEFF/, "");
        preparedHtml = addBaseHref(preparedHtml, url);
        preparedHtml = injectNavigationBridge(preparedHtml, url);
        preparedHtml = patchInlineNavigation(preparedHtml);
        preparedHtml = await inlinePatchedScripts(preparedHtml, url);
        return preparedHtml;
      }

      async function openWebsite() {
        retryBtn.hidden = true;

        const url = resolveUrl(getConfig());
        if (!url) {
          setStatus("Missing website URL.");
          retryBtn.hidden = false;
          return;
        }

        try {
          setStatus("Loading the anniversary page...");
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const html = await prepareHtml(await response.text(), url);
          const blobUrl = URL.createObjectURL(new Blob([html], { type: "text/html" }));
          window.location.replace(blobUrl);
        } catch (error) {
          console.error(error);
          setStatus("Could not open the anniversary page. Please try again.");
          retryBtn.hidden = false;
        }
      }

      retryBtn.addEventListener("click", openWebsite);
      openWebsite();
    </script>
  </body>
</html>
